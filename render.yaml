services:
  - type: web
    name: localcare-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FRONTEND_URL
        value: https://localcare-app.vercel.app
      - key: DATABASE_URL
        sync: false
